<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maître de Jeu — Plateau</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink:   #1a1209;
      --parch: #f5ead6;
      --gold:  #b8860b;
      --gold2: #d4a017;
      --red:   #8b1a1a;
    }

    body {
      background: #0d0a06;
      color: var(--parch);
      font-family: 'Crimson Pro', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--ink);
      border-bottom: 2px solid var(--gold);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
      z-index: 10;
    }
    header h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.1rem;
      color: var(--gold2);
      letter-spacing: .04em;
    }
    .badge {
      font-size: .72rem;
      padding: 3px 12px;
      border-radius: 20px;
      border: 1px solid var(--gold);
      text-transform: uppercase;
      letter-spacing: .1em;
    }
    .badge.waiting { color: var(--gold2); border-color: var(--gold); }
    .badge.picking { color: #4aedcc; border-color: #4aedcc; }
    .badge.playing { color: #6abf61; border-color: #6abf61; }

    .header-controls { margin-left: auto; display: flex; gap: 10px; align-items: center; }
    .btn {
      padding: 7px 16px;
      border-radius: 4px;
      border: 1px solid var(--gold);
      background: transparent;
      color: var(--gold2);
      font-family: 'Crimson Pro', serif;
      font-size: .9rem;
      cursor: pointer;
      transition: background .15s;
    }
    .btn:hover:not(:disabled) { background: rgba(184,134,11,.15); }
    .btn:disabled { opacity: .35; cursor: not-allowed; }
    .btn-danger { border-color: #e07070; color: #e07070; }
    .btn-danger:hover { background: rgba(224,112,112,.12) !important; }

    /* Layout */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Map area */
    .map-wrap {
      flex: 1;
      position: relative;
      overflow: auto;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      background: #0d0a06;
    }

    #mapContainer {
      position: relative;
      display: inline-block;
      flex-shrink: 0;
    }

    #mapImg {
      display: block;
      width: 100%;
      max-width: 1288px;
      height: auto;
      user-select: none;
    }

    #hexCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #hexOverlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      background: rgba(26,18,9,.95);
      border-left: 1px solid rgba(184,134,11,.25);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 16px;
      gap: 14px;
    }

    .panel {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(184,134,11,.2);
      border-radius: 8px;
      padding: 14px;
    }
    .panel h2 {
      font-family: 'Cinzel Decorative', serif;
      font-size: .75rem;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 10px;
      padding-bottom: 7px;
      border-bottom: 1px solid rgba(184,134,11,.2);
    }

    .player-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      border-radius: 5px;
      font-size: .9rem;
      margin-bottom: 5px;
      background: rgba(255,255,255,.03);
    }
    .player-row.active { background: rgba(106,191,97,.1); border: 1px solid rgba(106,191,97,.3); }
    .player-dot {
      width: 11px; height: 11px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .player-pos {
      margin-left: auto;
      font-size: .72rem;
      color: #6a5a3a;
      font-family: monospace;
    }
    .turn-tag {
      font-size: .65rem;
      padding: 2px 6px;
      background: #2d5a27;
      color: #d4f5d0;
      border-radius: 8px;
    }

    #logList { list-style: none; max-height: 260px; overflow-y: auto; }
    #logList li {
      font-size: .78rem;
      color: #8a7a5e;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
      line-height: 1.4;
    }
    #logList li:first-child { color: var(--parch); }

    .url-box {
      background: rgba(0,0,0,.4);
      color: var(--gold2);
      padding: 8px 10px;
      border-radius: 4px;
      font-family: monospace;
      font-size: .78rem;
      word-break: break-all;
      cursor: pointer;
      border: 1px solid rgba(184,134,11,.3);
    }

    /* Legend */
    .legend { display: flex; flex-wrap: wrap; gap: 6px; }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: .75rem; color: #8a7a5e; }
    .legend-swatch { width: 12px; height: 12px; border-radius: 2px; }

    /* Calibration panel */
    #calibPanel { display: none; }
    #calibPanel.open { display: block; }

    .calib-toggle {
      background: rgba(74,238,204,.1);
      border: 1px solid rgba(74,238,204,.4);
      color: #4aedcc;
      font-family: 'Crimson Pro', serif;
      font-size: .82rem;
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: background .15s;
    }
    .calib-toggle:hover { background: rgba(74,238,204,.2); }

    .slider-row {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 10px;
    }
    .slider-row label {
      display: flex;
      justify-content: space-between;
      font-size: .75rem;
      color: var(--gold);
      letter-spacing: .04em;
    }
    .slider-row label span {
      color: #4aedcc;
      font-family: monospace;
      font-size: .8rem;
    }
    .slider-row input[type=range] {
      width: 100%;
      accent-color: #4aedcc;
      cursor: pointer;
      height: 4px;
    }

    .calib-copy {
      width: 100%;
      margin-top: 8px;
      padding: 7px;
      background: rgba(74,238,204,.15);
      border: 1px solid rgba(74,238,204,.5);
      color: #4aedcc;
      font-family: 'Crimson Pro', serif;
      font-size: .82rem;
      border-radius: 4px;
      cursor: pointer;
    }
    .calib-copy:hover { background: rgba(74,238,204,.25); }

    .calib-code {
      background: rgba(0,0,0,.5);
      border: 1px solid rgba(74,238,204,.2);
      border-radius: 4px;
      padding: 8px;
      font-family: monospace;
      font-size: .7rem;
      color: #4aedcc;
      white-space: pre;
      margin-top: 8px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<header>
  <h1>⚓ Maître de Jeu</h1>
  <span id="statusBadge" class="badge waiting">En attente</span>
  <div class="header-controls">
    <button class="calib-toggle" onclick="toggleCalib()">⚙ Calibration</button>
    <button class="btn" id="btnStart" disabled onclick="startGame()">▶ Démarrer</button>
    <button class="btn btn-danger" onclick="resetGame()">↺ Reset</button>
  </div>
</header>

<div class="layout">
  <div class="map-wrap" id="mapWrap">
    <div id="mapContainer">
      <img id="mapImg" src="/Map.jpg" alt="Carte" />
      <canvas id="hexCanvas"></canvas>
      <svg id="hexOverlay" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>

  <div class="sidebar">
    <div class="panel" id="calibPanel">
      <h2>⚙ Calibration grille</h2>

      <div class="slider-row">
        <label>Rayon (HEX_R) <span id="vR">21.70</span>px</label>
        <input type="range" id="sR" min="10" max="50" step="0.1" value="21.7" oninput="updateCalib()">
      </div>
      <div class="slider-row">
        <label>Marge gauche (MARGIN_X) <span id="vMX">38</span>px</label>
        <input type="range" id="sMX" min="0" max="100" step="0.5" value="48" oninput="updateCalib()">
      </div>
      <div class="slider-row">
        <label>Marge haute (MARGIN_Y) <span id="vMY">38</span>px</label>
        <input type="range" id="sMY" min="0" max="100" step="0.5" value="44" oninput="updateCalib()">
      </div>
      <div class="slider-row">
        <label>Espacement col (COL_SP) <span id="vCS">48.60</span>px</label>
        <input type="range" id="sCS" min="20" max="70" step="0.1" value="48.6" oninput="updateCalib()">
      </div>
      <div class="slider-row">
        <label>Espacement rang (ROW_SP) <span id="vRS">41.60</span>px</label>
        <input type="range" id="sRS" min="15" max="60" step="0.1" value="41.6" oninput="updateCalib()">
      </div>
      <div class="slider-row">
        <label>Décalage rang impaire (offset) <span id="vOF">24.40</span>px</label>
        <input type="range" id="sOF" min="0" max="50" step="0.1" value="24.4" oninput="updateCalib()">
      </div>

      <div class="calib-code" id="calibCode"></div>
      <button class="calib-copy" onclick="copyCalib()">📋 Copier les constantes</button>
    </div>

    <div class="panel">
      <h2>Connexion joueur</h2>
      <div class="url-box" id="playerUrl" onclick="copyUrl()">Chargement…</div>
    </div>

    <div class="panel">
      <h2>Joueurs (<span id="playerCount">0</span>)</h2>
      <div id="playerList"><div style="color:#6a5a3a;font-style:italic;font-size:.85rem">Aucun joueur…</div></div>
    </div>

    <div class="panel">
      <h2>Légende</h2>
      <div class="legend">
        <div class="legend-item"><div class="legend-swatch" style="background:rgba(74,238,204,.35);border:1px solid #4aedcc"></div> Case départ</div>
        <div class="legend-item"><div class="legend-swatch" style="background:rgba(255,200,50,.25);border:1px solid #ffc832"></div> Déplacement</div>
        <div class="legend-item"><div class="legend-swatch" style="background:rgba(106,191,97,.2);border:1px solid #6abf61"></div> Tour actif</div>
      </div>
    </div>

    <div class="panel" style="flex:1">
      <h2>Journal</h2>
      <ul id="logList"><li>En attente…</li></ul>
    </div>
  </div>
</div>

<script>
// ─── Hex Grid Math (POINTY-TOP, odd-r offset RIGHT) ──────────────────────────
const COLS = 25, ROWS = 21;
const IMG_W = 1288, IMG_H = 952;

// Live calibration values (updated by sliders)
let MARGIN_X = 48.0;
let MARGIN_Y = 44.0;
let COL_SP   = 48.600;
let ROW_SP   = 41.600;
let HEX_R    = 21.700;
let ROW_OFFSET = 24.400;

const START_POSITIONS = [
  { q: 0,  r: 0  },
  { q: 12, r: 0  },
  { q: 24, r: 0  },
  { q: 24, r: 20 },
  { q: 12, r: 20 },
  { q: 0,  r: 20 },
];

function hexCenter(q, r, scale) {
  const s = scale || 1;
  return {
    x: (MARGIN_X + q * COL_SP + (r % 2 === 1 ? ROW_OFFSET : 0)) * s,
    y: (MARGIN_Y + r * ROW_SP) * s,
  };
}

function hexPoints(cx, cy, scale) {
  const s = scale || 1;
  const R = HEX_R * s;
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 2 + (Math.PI / 3) * i;
    pts.push(`${cx + R * Math.cos(angle)},${cy - R * Math.sin(angle)}`);
  }
  return pts.join(" ");
}

// ─── State & Socket ───────────────────────────────────────────────────────────
const socket = io();
let state = {};
let imgScale = 1;

const playerUrl = `${location.protocol}//${location.hostname}:${location.port}/player`;
document.getElementById("playerUrl").textContent = playerUrl;

function copyUrl() {
  navigator.clipboard.writeText(playerUrl).then(() => {
    const el = document.getElementById("playerUrl");
    const orig = el.textContent;
    el.textContent = "✓ Copié !";
    setTimeout(() => el.textContent = orig, 1500);
  });
}

socket.emit("master:join");

socket.on("game:state", (s) => {
  state = s;
  renderUI();
  renderMap();
});

// ─── UI Sidebar ───────────────────────────────────────────────────────────────
function renderUI() {
  // Badge
  const badge = document.getElementById("statusBadge");
  const labels = { waiting:"En attente", picking:"Choix départ", playing:"En cours", ended:"Terminée" };
  badge.textContent = labels[state.status] || state.status;
  badge.className = "badge " + state.status;

  // Players
  const players = Object.entries(state.players || {});
  document.getElementById("playerCount").textContent = players.length;
  const list = document.getElementById("playerList");
  if (!players.length) {
    list.innerHTML = `<div style="color:#6a5a3a;font-style:italic;font-size:.85rem">Aucun joueur…</div>`;
  } else {
    list.innerHTML = players.map(([id, p]) => {
      const isActive = state.currentTurn === id;
      const pos = p.position ? `${p.position.q},${p.position.r}` : "–";
      return `<div class="player-row ${isActive ? 'active' : ''}">
        <div class="player-dot" style="background:${p.color}"></div>
        <span>${p.name}</span>
        ${isActive ? `<span class="turn-tag">Tour</span>` : ""}
        <span class="player-pos">${pos}</span>
      </div>`;
    }).join("");
  }

  // Buttons
  document.getElementById("btnStart").disabled =
    players.length < 1 || state.status === "playing" || state.status === "picking";

  // Log
  const logList = document.getElementById("logList");
  logList.innerHTML = (state.log?.length ? state.log : ["Aucun événement."])
    .map(e => `<li>${e}</li>`).join("");
}

// ─── Map Rendering ────────────────────────────────────────────────────────────
function getScale() {
  const img = document.getElementById("mapImg");
  return img.clientWidth / IMG_W;
}

function renderMap() {
  const svg = document.getElementById("hexOverlay");
  const scale = getScale();

  let html = "";

  // Draw all hex cells lightly
  for (let r = 0; r < ROWS; r++) {
    for (let q = 0; q < COLS; q++) {
      const { x, y } = hexCenter(q, r, scale);
      const pts = hexPoints(x, y, scale);
      html += `<polygon points="${pts}" fill="transparent" stroke="rgba(184,134,11,0.08)" stroke-width="${scale}"/>`;
    }
  }

  // Highlight start slots (during picking phase)
  if (state.status === "picking" && state.pendingStartSlots) {
    for (const { q, r } of state.pendingStartSlots) {
      const { x, y } = hexCenter(q, r, scale);
      const pts = hexPoints(x, y, scale);
      html += `<polygon points="${pts}" fill="rgba(74,238,204,0.25)" stroke="#4aedcc" stroke-width="${1.5*scale}"/>`;
    }
  }

  // Highlight move options
  if (state.moveOptions?.length) {
    for (const { q, r } of state.moveOptions) {
      const { x, y } = hexCenter(q, r, scale);
      const pts = hexPoints(x, y, scale);
      html += `<polygon points="${pts}" fill="rgba(255,200,50,0.22)" stroke="#ffc832" stroke-width="${1.5*scale}"/>`;
    }
  }

  // Draw player tokens
  const players = Object.entries(state.players || {});
  for (const [id, p] of players) {
    if (!p.position) continue;
    const { q, r } = p.position;
    const { x, y } = hexCenter(q, r, scale);
    const isActive = state.currentTurn === id;
    const radius = 9 * scale;
    if (isActive) {
      html += `<circle cx="${x}" cy="${y}" r="${radius+3*scale}" fill="none" stroke="${p.color}" stroke-width="${1.5*scale}" opacity="0.6"/>`;
    }
    html += `<circle cx="${x}" cy="${y}" r="${radius}" fill="${p.color}" stroke="#1a1209" stroke-width="${scale}"/>`;
    const fs = 7 * scale;
    html += `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="central" fill="#1a1209" font-family="Cinzel Decorative" font-size="${fs}" font-weight="bold">${p.name[0].toUpperCase()}</text>`;
  }

  // Dice roll display: show value near current player
  if (state.diceRoll && state.players[state.diceRoll.playerId]?.position) {
    const p = state.players[state.diceRoll.playerId];
    const { x, y } = hexCenter(p.position.q, p.position.r, scale);
    const fs = 11 * scale;
    html += `<text x="${x+18*scale}" y="${y-18*scale}" text-anchor="middle" dominant-baseline="central" fill="#ffc832" font-size="${fs*1.4}" filter="url(#shadow)">🎲${state.diceRoll.value}</text>`;
  }

  svg.innerHTML = `<defs><filter id="shadow"><feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#000" flood-opacity="0.8"/></filter></defs>` + html;
}

// ─── Calibration ──────────────────────────────────────────────────────────────
function toggleCalib() {
  const panel = document.getElementById("calibPanel");
  panel.classList.toggle("open");
  if (panel.classList.contains("open")) updateCalibDisplay();
}

function updateCalib() {
  HEX_R      = parseFloat(document.getElementById("sR").value);
  MARGIN_X   = parseFloat(document.getElementById("sMX").value);
  MARGIN_Y   = parseFloat(document.getElementById("sMY").value);
  COL_SP     = parseFloat(document.getElementById("sCS").value);
  ROW_SP     = parseFloat(document.getElementById("sRS").value);
  ROW_OFFSET = parseFloat(document.getElementById("sOF").value);

  document.getElementById("vR").textContent  = HEX_R.toFixed(2);
  document.getElementById("vMX").textContent = MARGIN_X.toFixed(1);
  document.getElementById("vMY").textContent = MARGIN_Y.toFixed(1);
  document.getElementById("vCS").textContent = COL_SP.toFixed(2);
  document.getElementById("vRS").textContent = ROW_SP.toFixed(2);
  document.getElementById("vOF").textContent = ROW_OFFSET.toFixed(2);

  updateCalibDisplay();
  syncCanvasSize();
  renderMap();
}

function updateCalibDisplay() {
  document.getElementById("calibCode").textContent =
`HEX_R    = ${HEX_R.toFixed(3)}
MARGIN_X = ${MARGIN_X.toFixed(1)}
MARGIN_Y = ${MARGIN_Y.toFixed(1)}
COL_SP   = ${COL_SP.toFixed(3)}
ROW_SP   = ${ROW_SP.toFixed(3)}
OFFSET   = ${ROW_OFFSET.toFixed(3)}`;
}

function copyCalib() {
  const txt =
`const HEX_R    = ${HEX_R.toFixed(3)};
const MARGIN_X = ${MARGIN_X.toFixed(1)};
const MARGIN_Y = ${MARGIN_Y.toFixed(1)};
const COL_SP   = ${COL_SP.toFixed(3)};
const ROW_SP   = ${ROW_SP.toFixed(3)};
const ROW_OFFSET = ${ROW_OFFSET.toFixed(3)};`;
  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.querySelector(".calib-copy");
    btn.textContent = "✓ Copié !";
    setTimeout(() => btn.textContent = "📋 Copier les constantes", 1500);
  });
}

// Init calibration display
updateCalibDisplay();

// ─── Controls ─────────────────────────────────────────────────────────────────
function startGame() { socket.emit("master:start"); }
function resetGame() { if (confirm("Réinitialiser la partie ?")) socket.emit("master:reset"); }

// ─── Resize handling ──────────────────────────────────────────────────────────
const mapImg = document.getElementById("mapImg");
mapImg.addEventListener("load", () => {
  syncCanvasSize();
  renderMap();
});
window.addEventListener("resize", () => {
  syncCanvasSize();
  renderMap();
});

function syncCanvasSize() {
  const img = document.getElementById("mapImg");
  const svg = document.getElementById("hexOverlay");
  svg.setAttribute("width", img.clientWidth);
  svg.setAttribute("height", img.clientHeight);
  svg.style.width = img.clientWidth + "px";
  svg.style.height = img.clientHeight + "px";
}

// Init if image already loaded
if (mapImg.complete) {
  syncCanvasSize();
  renderMap();
}
</script>
</body>
</html>
