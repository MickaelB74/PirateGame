<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maître de Jeu — Plateau</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink:    #1a1209;
      --parch:  #f5ead6;
      --gold:   #b8860b;
      --gold2:  #d4a017;
      --teal:   #4aedcc;
      --border: rgba(184,134,11,.22);
    }
    html, body { width:100%; height:100%; background:#0d0a06; color:var(--parch); font-family:'Crimson Pro',Georgia,serif; overflow:hidden; }

    /* HEADER */
    header {
      background:var(--ink); border-bottom:2px solid var(--gold);
      padding:10px 20px; display:flex; align-items:center; gap:16px;
      flex-shrink:0; z-index:20; height:50px;
    }
    header h1 { font-family:'Cinzel Decorative',serif; font-size:1.1rem; color:var(--gold2); letter-spacing:.04em; }
    .badge { font-size:.75rem; padding:3px 12px; border-radius:20px; border:1px solid var(--gold); text-transform:uppercase; letter-spacing:.1em; }
    .badge.waiting { color:var(--gold2); border-color:var(--gold); }
    .badge.picking  { color:#4aedcc; border-color:#4aedcc; }
    .badge.playing  { color:#6abf61; border-color:#6abf61; }
    .header-controls { margin-left:auto; display:flex; gap:8px; align-items:center; }
    .btn { padding:7px 16px; border-radius:4px; border:1px solid var(--gold); background:transparent; color:var(--gold2); font-family:'Crimson Pro',serif; font-size:.95rem; cursor:pointer; transition:background .15s; }
    .btn:hover:not(:disabled) { background:rgba(184,134,11,.15); }
    .btn:disabled { opacity:.35; cursor:not-allowed; }
    .btn-danger { border-color:#e07070; color:#e07070; }
    .btn-danger:hover { background:rgba(224,112,112,.12) !important; }

    /* GRILLE PLATEAU — header=50px */
    .plateau {
      display:grid;
      grid-template-columns:230px 1fr 230px;
      grid-template-rows:88px 1fr;
      width:100vw;
      height:calc(100vh - 50px);
    }

    /* ═══ BORD HAUT span 3 cols ═══ */
    .zone-top {
      grid-column:1/4; grid-row:1;
      display:flex; align-items:stretch;
      background:linear-gradient(180deg,rgba(8,5,1,.98),rgba(13,9,5,.92));
      border-bottom:1px solid var(--border);
      position:relative;
    }
    .zone-top::after {
      content:''; position:absolute; bottom:-1px; left:50%; transform:translateX(-50%);
      width:300px; height:1px;
      background:linear-gradient(90deg,transparent,var(--gold2),transparent);
    }

    /* Bloc Enigmes */
    .top-enigmes {
      display:flex; align-items:center; gap:8px;
      padding:0 20px; border-right:1px solid var(--border);
      flex-shrink:0;
    }
    .top-label {
      font-family:'Cinzel Decorative',serif; font-size:.6rem;
      color:var(--gold); text-transform:uppercase; letter-spacing:.14em;
      white-space:nowrap; opacity:.65; margin-right:4px;
    }

    /* Slot de carte universel */
    .card-slot {
      width:58px; height:76px;
      border:1px dashed rgba(184,134,11,.3);
      border-radius:6px;
      background:rgba(255,255,255,.025);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:3px; flex-shrink:0; cursor:default;
      position:relative;
    }
    .card-slot .cs-icon { font-size:1.3rem; }
    .card-slot .cs-label {
      font-size:.5rem; text-transform:uppercase; letter-spacing:.07em;
      color:#6a5a3a; text-align:center; line-height:1.2; padding:0 3px;
    }
    .card-slot .cs-sub {
      font-size:.42rem; color:#4a3a1a; text-align:center; line-height:1.2;
    }

    /* Bloc Avancement */
    .top-avancement {
      flex:1; display:flex; align-items:center; gap:6px;
      padding:0 16px; overflow-x:auto;
      scrollbar-width:none;
    }
    .top-avancement::-webkit-scrollbar { display:none; }
    .av-arrow { color:rgba(184,134,11,.3); font-size:.8rem; flex-shrink:0; }

    /* ═══ BORDS LATÉRAUX ═══ */
    .zone-ile-gauche, .zone-ile-droite {
      grid-row:2;
      display:flex; flex-direction:column; gap:0;
      overflow-y:auto; overflow-x:hidden;
      background:linear-gradient(180deg,rgba(10,7,3,.96),rgba(15,10,5,.99));
      scrollbar-width:thin; scrollbar-color:var(--gold) transparent;
    }
    .zone-ile-gauche { grid-column:1; border-right:1px solid var(--border); }
    .zone-ile-droite { grid-column:3; border-left:1px solid var(--border); }
    ::-webkit-scrollbar { width:3px; }
    ::-webkit-scrollbar-thumb { background:rgba(184,134,11,.3); border-radius:2px; }

    .ile-section-title {
      font-family:'Cinzel Decorative',serif; font-size:.58rem;
      color:var(--gold); text-transform:uppercase; letter-spacing:.1em;
      padding:8px 10px 6px; border-bottom:1px solid rgba(184,134,11,.12);
      text-align:center; flex-shrink:0;
    }

    /* Mat Card île — prend la hauteur dispo équitablement */
    .ile-card {
      flex:1; min-height:0;
      background:rgba(20,13,5,.9);
      border-bottom:1px solid rgba(184,134,11,.1);
      padding:8px 10px;
      display:flex; flex-direction:column; gap:5px;
      position:relative; overflow:hidden;
      transition:background .2s;
    }
    .ile-card:last-child { border-bottom:none; }
    .ile-card:hover { background:rgba(26,17,6,.95); }
    .ile-card::before {
      content:''; position:absolute; top:0; left:0;
      width:2px; height:100%; background:var(--gold2); opacity:0; transition:opacity .2s;
    }
    .ile-card:hover::before { opacity:1; }

    .ile-header { display:flex; align-items:flex-start; gap:6px; }
    .ile-icon { font-size:1.2rem; flex-shrink:0; margin-top:1px; }
    .ile-info { flex:1; min-width:0; }
    .ile-name {
      font-family:'Cinzel',serif; font-size:.75rem; font-weight:600;
      color:#eedcb4; line-height:1.25; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .ile-biome {
      font-size:.62rem; color:#8a7a5e; font-style:italic; margin-top:1px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }

    /* Slots objets (style cargaison) */
    .ile-objets-label {
      font-size:.52rem; text-transform:uppercase; letter-spacing:.08em;
      color:#5a4a2a; margin-top:auto; padding-top:4px;
    }
    .ile-objets-grid {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(28px,1fr)); gap:3px;
    }
    .obj-slot {
      aspect-ratio:1; border:1px dashed rgba(184,134,11,.2); border-radius:3px;
      background:rgba(255,255,255,.02);
      display:flex; align-items:center; justify-content:center;
      font-size:.6rem; color:#3a2a10; cursor:default;
      transition:border-color .15s;
    }
    .obj-slot:hover { border-color:rgba(184,134,11,.4); }

    /* ═══ CENTRE : CARTE DU MONDE ═══ */
    .zone-carte {
      grid-column:2; grid-row:2;
      position:relative; overflow:hidden;
      background:#0d0a06;
      display:flex; align-items:flex-start; justify-content:flex-start;
    }
    #mapContainer { position:relative; display:inline-block; flex-shrink:0; }
    #mapImg { display:block; width:100%; max-width:1288px; height:auto; user-select:none; }
    #hexCanvas { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
    #hexOverlay { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }

    /* Sidebar flottante */
    .sidebar {
      position:absolute; right:0; top:0; width:256px; height:100%;
      background:rgba(20,13,5,.97); border-left:1px solid rgba(184,134,11,.2);
      display:flex; flex-direction:column; overflow-y:auto;
      padding:12px; gap:10px; z-index:15;
      transform:translateX(100%); transition:transform .25s ease;
    }
    .sidebar.open { transform:translateX(0); }
    .sidebar-toggle {
      position:absolute; right:0; top:50%; transform:translateY(-50%);
      background:rgba(20,13,5,.92); border:1px solid var(--border); border-right:none;
      color:var(--gold2); font-size:.72rem; padding:10px 5px; cursor:pointer;
      border-radius:4px 0 0 4px;
      writing-mode:vertical-rl; text-orientation:mixed;
      letter-spacing:.1em; font-family:'Cinzel',serif; z-index:16;
    }
    .sidebar-toggle:hover { background:rgba(30,20,8,.95); }

    .panel { background:rgba(255,255,255,.04); border:1px solid rgba(184,134,11,.18); border-radius:6px; padding:10px 12px; }
    .panel h2 {
      font-family:'Cinzel Decorative',serif; font-size:.72rem; color:var(--gold);
      text-transform:uppercase; letter-spacing:.06em;
      margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid rgba(184,134,11,.18);
    }
    .player-row {
      display:flex; align-items:center; gap:7px;
      padding:6px 7px; border-radius:4px; font-size:.92rem;
      margin-bottom:4px; background:rgba(255,255,255,.03);
    }
    .player-row.active { background:rgba(106,191,97,.1); border:1px solid rgba(106,191,97,.3); }
    .player-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .player-pos { margin-left:auto; font-size:.72rem; color:#6a5a3a; font-family:monospace; }
    .turn-tag { font-size:.62rem; padding:1px 5px; background:#2d5a27; color:#d4f5d0; border-radius:6px; }
    #logList { list-style:none; max-height:220px; overflow-y:auto; }
    #logList li { font-size:.8rem; color:#8a7a5e; padding:3px 0; border-bottom:1px solid rgba(255,255,255,.04); line-height:1.4; }
    #logList li:first-child { color:var(--parch); }
    .url-box {
      background:rgba(0,0,0,.4); color:var(--gold2); padding:7px 9px; border-radius:4px;
      font-family:monospace; font-size:.76rem; word-break:break-all; cursor:pointer;
      border:1px solid rgba(184,134,11,.3);
    }
    .legend { display:flex; flex-wrap:wrap; gap:5px; }
    .legend-item { display:flex; align-items:center; gap:4px; font-size:.75rem; color:#8a7a5e; }
    .legend-swatch { width:10px; height:10px; border-radius:2px; }

    /* Calibration */
    #calibPanel { display:none; }
    #calibPanel.open { display:block; }
    .calib-toggle {
      background:rgba(74,238,204,.1); border:1px solid rgba(74,238,204,.4);
      color:#4aedcc; font-family:'Crimson Pro',serif; font-size:.82rem;
      padding:5px 12px; border-radius:4px; cursor:pointer; transition:background .15s;
    }
    .calib-toggle:hover { background:rgba(74,238,204,.2); }
    .slider-row { display:flex; flex-direction:column; gap:2px; margin-bottom:8px; }
    .slider-row label { display:flex; justify-content:space-between; font-size:.72rem; color:var(--gold); letter-spacing:.03em; }
    .slider-row label span { color:#4aedcc; font-family:monospace; font-size:.78rem; }
    .slider-row input[type=range] { width:100%; accent-color:#4aedcc; cursor:pointer; height:3px; }
    .calib-copy {
      width:100%; margin-top:6px; padding:6px;
      background:rgba(74,238,204,.15); border:1px solid rgba(74,238,204,.5);
      color:#4aedcc; font-family:'Crimson Pro',serif; font-size:.78rem;
      border-radius:4px; cursor:pointer;
    }
    .calib-copy:hover { background:rgba(74,238,204,.25); }
    .calib-code {
      background:rgba(0,0,0,.5); border:1px solid rgba(74,238,204,.2); border-radius:4px;
      padding:6px; font-family:monospace; font-size:.67rem; color:#4aedcc;
      white-space:pre; margin-top:6px; line-height:1.6;
    }

    /* Tooltip */
    #tooltip {
      position:fixed; background:rgba(8,5,1,.97); border:1px solid var(--border);
      border-radius:5px; padding:7px 11px; font-size:.8rem; color:#e8d4a8;
      max-width:200px; pointer-events:none; z-index:100; display:none; line-height:1.5;
    }
    #tooltip.show { display:block; }
    #tooltip strong { color:var(--gold2); font-family:'Cinzel',serif; font-size:.72rem; display:block; margin-bottom:2px; }
  </style>
</head>
<body>
<div id="tooltip"></div>

<!-- HEADER -->
<header>
  <h1>⚓ Maître de Jeu</h1>
  <span id="statusBadge" class="badge waiting">En attente</span>
  <div class="header-controls">
    <button class="calib-toggle" onclick="toggleCalib()">⚙ Calibration</button>
    <button class="btn" id="btnStart" disabled onclick="startGame()">▶ Démarrer</button>
    <button class="btn btn-danger" onclick="resetGame()">↺ Reset</button>
  </div>
</header>

<div class="plateau">

  <!-- ═══ BORD HAUT ═══ -->
  <div class="zone-top">

    <!-- Bloc Énigmes -->
    <div class="top-enigmes">
      <span class="top-label">Énigmes</span>
      <div class="card-slot" data-tip="Latitude|Révèle une coordonnée X.">
        <span class="cs-icon">↔</span>
        <span class="cs-label">Latitude</span>
        <span class="cs-sub">vide</span>
      </div>
      <div class="card-slot" data-tip="Longitude|Révèle une coordonnée Y.">
        <span class="cs-icon">↕</span>
        <span class="cs-label">Longitude</span>
        <span class="cs-sub">vide</span>
      </div>
      <div class="card-slot" data-tip="Code|Combinaison de déchiffrement.">
        <span class="cs-icon">🔐</span>
        <span class="cs-label">Code</span>
        <span class="cs-sub">vide</span>
      </div>
    </div>

    <!-- Bloc Avancement -->
    <div class="top-avancement" id="topAvancement">
      <span class="top-label">Avancement</span>
      <!-- généré dynamiquement depuis la config -->
    </div>

  </div>

  <!-- ═══ ÎLES GAUCHE ═══ -->
  <div class="zone-ile-gauche" id="ileGauche">
    <div class="ile-section-title">🏝 Îles</div>
    <!-- généré depuis config -->
  </div>

  <!-- ═══ CARTE DU MONDE ═══ -->
  <div class="zone-carte" id="mapWrap">
    <div id="mapContainer">
      <img id="mapImg" src="/Map.jpg" alt="Carte" />
      <canvas id="hexCanvas"></canvas>
      <svg id="hexOverlay" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="sidebar" id="sidebar">
      <div class="panel" id="calibPanel">
        <h2>⚙ Calibration grille</h2>
        <div class="slider-row"><label>Rayon (HEX_R) <span id="vR">21.70</span>px</label><input type="range" id="sR" min="10" max="50" step="0.1" value="21.7" oninput="updateCalib()"></div>
        <div class="slider-row"><label>Marge gauche (MARGIN_X) <span id="vMX">48</span>px</label><input type="range" id="sMX" min="0" max="100" step="0.5" value="48" oninput="updateCalib()"></div>
        <div class="slider-row"><label>Marge haute (MARGIN_Y) <span id="vMY">44</span>px</label><input type="range" id="sMY" min="0" max="100" step="0.5" value="44" oninput="updateCalib()"></div>
        <div class="slider-row"><label>Espacement col (COL_SP) <span id="vCS">48.60</span>px</label><input type="range" id="sCS" min="20" max="70" step="0.1" value="48.6" oninput="updateCalib()"></div>
        <div class="slider-row"><label>Espacement rang (ROW_SP) <span id="vRS">41.60</span>px</label><input type="range" id="sRS" min="15" max="60" step="0.1" value="41.6" oninput="updateCalib()"></div>
        <div class="slider-row"><label>Décalage rang impaire <span id="vOF">24.40</span>px</label><input type="range" id="sOF" min="0" max="50" step="0.1" value="24.4" oninput="updateCalib()"></div>
        <div class="calib-code" id="calibCode"></div>
        <button class="calib-copy" onclick="copyCalib()">📋 Copier les constantes</button>
      </div>
      <div class="panel">
        <h2>Connexion joueur</h2>
        <div class="url-box" id="playerUrl" onclick="copyUrl()">Chargement…</div>
      </div>
      <div class="panel">
        <h2>Joueurs (<span id="playerCount">0</span>)</h2>
        <div id="playerList"><div style="color:#6a5a3a;font-style:italic;font-size:.85rem">Aucun joueur…</div></div>
      </div>
      <div class="panel">
        <h2>Légende</h2>
        <div class="legend">
          <div class="legend-item"><div class="legend-swatch" style="background:rgba(74,238,204,.35);border:1px solid #4aedcc"></div> Case départ</div>
          <div class="legend-item"><div class="legend-swatch" style="background:rgba(255,200,50,.25);border:1px solid #ffc832"></div> Déplacement</div>
          <div class="legend-item"><div class="legend-swatch" style="background:rgba(106,191,97,.2);border:1px solid #6abf61"></div> Tour actif</div>
        </div>
      </div>
      <div class="panel" style="flex:1">
        <h2>Journal</h2>
        <ul id="logList"><li>En attente…</li></ul>
      </div>
    </div>
    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">Joueurs &amp; Log</button>
  </div>

  <!-- ═══ ÎLES DROITE ═══ -->
  <div class="zone-ile-droite" id="ileDroite">
    <div class="ile-section-title">🏝 Îles</div>
    <!-- généré depuis config -->
  </div>

</div><!-- fin .plateau -->

<script>
// ─── Hex Grid Math ────────────────────────────────────────────────────────────
const COLS=25, ROWS=21, IMG_W=1288, IMG_H=952;
let MARGIN_X=48, MARGIN_Y=44, COL_SP=48.6, ROW_SP=41.6, HEX_R=21.7, ROW_OFFSET=24.4;

function hexCenter(q,r,s){ s=s||1; return { x:(MARGIN_X+q*COL_SP+(r%2===1?ROW_OFFSET:0))*s, y:(MARGIN_Y+r*ROW_SP)*s }; }
function hexPoints(cx,cy,s){ s=s||1; const R=HEX_R*s,pts=[]; for(let i=0;i<6;i++){ const a=Math.PI/2+(Math.PI/3)*i; pts.push(`${cx+R*Math.cos(a)},${cy-R*Math.sin(a)}`); } return pts.join(' '); }

// ─── Config & Socket ──────────────────────────────────────────────────────────
const socket=io();
let state={}, cfg={};

const playerUrl=`${location.protocol}//${location.hostname}:${location.port}/player`;
document.getElementById('playerUrl').textContent=playerUrl;
function copyUrl(){ navigator.clipboard.writeText(playerUrl).then(()=>{ const el=document.getElementById('playerUrl'); const o=el.textContent; el.textContent='✓ Copié !'; setTimeout(()=>el.textContent=o,1500); }); }

socket.emit('master:join');
socket.on('game:state',(s)=>{ state=s; renderUI(); renderMap(); });
socket.on('config:updated',(cards)=>{ cfg=cards; renderIles(); renderAvancement(); });

// Charger la config admin pour les îles et l'avancement
fetch('/api/config').then(r=>r.json()).then(c=>{ cfg=c.cards||{}; renderIles(); renderAvancement(); }).catch(()=>{});

// ─── Rendu Îles ───────────────────────────────────────────────────────────────
function renderIles(){
  const iles = cfg.iles || [];
  const mid  = Math.ceil(iles.length/2);
  const left  = iles.slice(0,mid);
  const right = iles.slice(mid);
  document.getElementById('ileGauche').innerHTML = `<div class="ile-section-title">🏝 Îles</div>` + left.map(ileCardHTML).join('');
  document.getElementById('ileDroite').innerHTML = `<div class="ile-section-title">🏝 Îles</div>` + right.map(ileCardHTML).join('');
}

function ileCardHTML(ile){
  const nbObjets = ile.nb_objets || 3;
  const slots = Array.from({length:nbObjets}).map(()=>`<div class="obj-slot">·</div>`).join('');
  return `<div class="ile-card">
    <div class="ile-header">
      <span class="ile-icon">${ile.icon||'🏝'}</span>
      <div class="ile-info">
        <div class="ile-name">${ile.nom||'Île'}</div>
        <div class="ile-biome">${ile.biome||''}</div>
      </div>
    </div>
    <div class="ile-objets-label">Objets</div>
    <div class="ile-objets-grid">${slots}</div>
  </div>`;
}

// ─── Rendu Avancement ─────────────────────────────────────────────────────────
function renderAvancement(){
  const nb = cfg.avancement?.nb_cartes_temps || 6;
  const container = document.getElementById('topAvancement');
  let html = `<span class="top-label">Avancement</span>`;
  for(let i=0;i<nb;i++){
    if(i>0) html += `<span class="av-arrow">›</span>`;
    html += `<div class="card-slot" data-tip="Temps ${i+1}|Carte d'avancement de partie.">
      <span class="cs-icon">⏳</span>
      <span class="cs-label">Temps ${i+1}</span>
      <span class="cs-sub">vide</span>
    </div>`;
  }
  container.innerHTML = html;
  // Rebind tooltips
  bindTooltips();
}

// ─── UI Socket ────────────────────────────────────────────────────────────────
function renderUI(){
  const badge=document.getElementById('statusBadge');
  const labels={waiting:'En attente',picking:'Choix départ',playing:'En cours',ended:'Terminée'};
  badge.textContent=labels[state.status]||state.status;
  badge.className='badge '+state.status;

  const players=Object.entries(state.players||{});
  document.getElementById('playerCount').textContent=players.length;
  const list=document.getElementById('playerList');
  list.innerHTML=players.length
    ? players.map(([id,p])=>{
        const isActive=state.currentTurn===id;
        const pos=p.position?`${p.position.q},${p.position.r}`:'–';
        return `<div class="player-row ${isActive?'active':''}">
          <div class="player-dot" style="background:${p.color}"></div>
          <span>${p.name}</span>
          ${isActive?`<span class="turn-tag">Tour</span>`:''}
          <span class="player-pos">${pos}</span>
        </div>`;
      }).join('')
    : `<div style="color:#6a5a3a;font-style:italic;font-size:.85rem">Aucun joueur…</div>`;

  document.getElementById('btnStart').disabled=players.length<1||state.status==='playing'||state.status==='picking';
  document.getElementById('logList').innerHTML=(state.log?.length?state.log:['Aucun événement.']).map(e=>`<li>${e}</li>`).join('');
}

// ─── Map Rendering ────────────────────────────────────────────────────────────
function getScale(){ const img=document.getElementById('mapImg'); return img.clientWidth/IMG_W; }

function renderMap(){
  const svg=document.getElementById('hexOverlay'), scale=getScale();
  let html='';
  for(let r=0;r<ROWS;r++) for(let q=0;q<COLS;q++){
    const {x,y}=hexCenter(q,r,scale);
    html+=`<polygon points="${hexPoints(x,y,scale)}" fill="transparent" stroke="rgba(184,134,11,0.08)" stroke-width="${scale}"/>`;
  }
  if(state.status==='picking'&&state.pendingStartSlots)
    for(const {q,r} of state.pendingStartSlots){
      const {x,y}=hexCenter(q,r,scale);
      html+=`<polygon points="${hexPoints(x,y,scale)}" fill="rgba(74,238,204,0.25)" stroke="#4aedcc" stroke-width="${1.5*scale}"/>`;
    }
  if(state.moveOptions?.length)
    for(const {q,r} of state.moveOptions){
      const {x,y}=hexCenter(q,r,scale);
      html+=`<polygon points="${hexPoints(x,y,scale)}" fill="rgba(255,200,50,0.22)" stroke="#ffc832" stroke-width="${1.5*scale}"/>`;
    }
  for(const [id,p] of Object.entries(state.players||{})){
    if(!p.position) continue;
    const {x,y}=hexCenter(p.position.q,p.position.r,scale);
    const isActive=state.currentTurn===id, radius=9*scale;
    if(isActive) html+=`<circle cx="${x}" cy="${y}" r="${radius+3*scale}" fill="none" stroke="${p.color}" stroke-width="${1.5*scale}" opacity="0.6"/>`;
    html+=`<circle cx="${x}" cy="${y}" r="${radius}" fill="${p.color}" stroke="#1a1209" stroke-width="${scale}"/>`;
    html+=`<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="central" fill="#1a1209" font-family="Cinzel Decorative" font-size="${7*scale}" font-weight="bold">${p.name[0].toUpperCase()}</text>`;
  }
  if(state.diceRoll&&state.players[state.diceRoll.playerId]?.position){
    const p=state.players[state.diceRoll.playerId], {x,y}=hexCenter(p.position.q,p.position.r,scale);
    html+=`<text x="${x+18*scale}" y="${y-18*scale}" text-anchor="middle" dominant-baseline="central" fill="#ffc832" font-size="${11*scale*1.4}" filter="url(#shadow)">🎲${state.diceRoll.value}</text>`;
  }
  svg.innerHTML=`<defs><filter id="shadow"><feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#000" flood-opacity="0.8"/></filter></defs>`+html;
}

// ─── Sidebar ──────────────────────────────────────────────────────────────────
function toggleSidebar(){
  const sb=document.getElementById('sidebar'), btn=document.getElementById('sidebarToggle');
  sb.classList.toggle('open');
  btn.style.right=sb.classList.contains('open')?'256px':'0';
}

// ─── Calibration ─────────────────────────────────────────────────────────────
function toggleCalib(){ const p=document.getElementById('calibPanel'); p.classList.toggle('open'); if(p.classList.contains('open')) updateCalibDisplay(); }
function updateCalib(){
  HEX_R=parseFloat(document.getElementById('sR').value);
  MARGIN_X=parseFloat(document.getElementById('sMX').value);
  MARGIN_Y=parseFloat(document.getElementById('sMY').value);
  COL_SP=parseFloat(document.getElementById('sCS').value);
  ROW_SP=parseFloat(document.getElementById('sRS').value);
  ROW_OFFSET=parseFloat(document.getElementById('sOF').value);
  document.getElementById('vR').textContent=HEX_R.toFixed(2);
  document.getElementById('vMX').textContent=MARGIN_X.toFixed(1);
  document.getElementById('vMY').textContent=MARGIN_Y.toFixed(1);
  document.getElementById('vCS').textContent=COL_SP.toFixed(2);
  document.getElementById('vRS').textContent=ROW_SP.toFixed(2);
  document.getElementById('vOF').textContent=ROW_OFFSET.toFixed(2);
  updateCalibDisplay(); syncCanvasSize(); renderMap();
}
function updateCalibDisplay(){
  document.getElementById('calibCode').textContent=
`HEX_R    = ${HEX_R.toFixed(3)}\nMARGIN_X = ${MARGIN_X.toFixed(1)}\nMARGIN_Y = ${MARGIN_Y.toFixed(1)}\nCOL_SP   = ${COL_SP.toFixed(3)}\nROW_SP   = ${ROW_SP.toFixed(3)}\nOFFSET   = ${ROW_OFFSET.toFixed(3)}`;
}
function copyCalib(){
  const txt=`const HEX_R=${HEX_R.toFixed(3)};\nconst MARGIN_X=${MARGIN_X.toFixed(1)};\nconst MARGIN_Y=${MARGIN_Y.toFixed(1)};\nconst COL_SP=${COL_SP.toFixed(3)};\nconst ROW_SP=${ROW_SP.toFixed(3)};\nconst ROW_OFFSET=${ROW_OFFSET.toFixed(3)};`;
  navigator.clipboard.writeText(txt).then(()=>{ const b=document.querySelector('.calib-copy'); b.textContent='✓ Copié !'; setTimeout(()=>b.textContent='📋 Copier les constantes',1500); });
}

// ─── Controls ─────────────────────────────────────────────────────────────────
function startGame(){ socket.emit('master:start'); }
function resetGame(){ if(confirm('Réinitialiser la partie ?')) socket.emit('master:reset'); }

// ─── Resize ───────────────────────────────────────────────────────────────────
const mapImg=document.getElementById('mapImg');
mapImg.addEventListener('load',()=>{ syncCanvasSize(); renderMap(); });
window.addEventListener('resize',()=>{ syncCanvasSize(); renderMap(); });
function syncCanvasSize(){
  const img=document.getElementById('mapImg'), svg=document.getElementById('hexOverlay');
  svg.setAttribute('width',img.clientWidth); svg.setAttribute('height',img.clientHeight);
  svg.style.width=img.clientWidth+'px'; svg.style.height=img.clientHeight+'px';
}
if(mapImg.complete){ syncCanvasSize(); renderMap(); }

// ─── Tooltip ──────────────────────────────────────────────────────────────────
const tip=document.getElementById('tooltip');
function bindTooltips(){
  document.querySelectorAll('[data-tip]').forEach(el=>{
    if(el._tipBound) return; el._tipBound=true;
    el.addEventListener('mouseenter',()=>{ const[t,d]=el.dataset.tip.split('|'); tip.innerHTML=`<strong>${t}</strong>${d||''}`; tip.classList.add('show'); });
    el.addEventListener('mousemove',e=>{ let x=e.clientX+12,y=e.clientY-8; if(x+210>window.innerWidth)x=e.clientX-215; if(y+70>window.innerHeight)y=e.clientY-65; tip.style.left=x+'px'; tip.style.top=y+'px'; });
    el.addEventListener('mouseleave',()=>tip.classList.remove('show'));
  });
}
bindTooltips();
updateCalibDisplay();
</script>
